name: Daily Market Update

on:
  schedule:
    - cron: "0 22 * * *"
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python deps
        run: pip install -r requirements.txt

      # ── 1. 既存の市場データ ──
      - name: Fetch market data (yfinance)
        run: python scripts/fetch_market_data.py

      # ── 2. FRED マクロ指標 ──
      - name: Fetch macro indicators (FRED)
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scripts/fetch_macro_indicators.py

      # ── 3. ニュース + 注目チャート3本選定 ──
      - name: Fetch & summarize news (Claude API)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PYTHONPATH: scripts
        run: python scripts/fetch_news.py

      # ── 4. 注目チャート3本の1年日次データ ──
      - name: Fetch featured charts (1Y daily)
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          PYTHONPATH: scripts
        run: python scripts/fetch_featured_charts.py

      # ── 4b. 経済指標チャート (日替わり) ──
      - name: Fetch economic indicator chart
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scripts/fetch_economic_chart.py

      # ── 5. data/ をリポジトリに戻す ──
      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if ! git diff --staged --quiet; then
            git commit -m "chore: update market data $(date -u +'%Y-%m-%d')"
            git push
          else
            echo "No data changes; skipping commit."
          fi

      # ── 6. Viteビルド ──
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install npm deps
        run: npm ci

      - name: Build
        run: npm run build
        env:
          BASE_URL: "/market-monitor/"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
