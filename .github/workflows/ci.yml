name: CI

# v13.4.0 で導入: PR と main 以外への push で lint + test + build を回す
# main への push 時は daily-update.yml が走るので、ここでは触らない (重複回避)
on:
  pull_request:
  push:
    branches-ignore: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ───────────────────────────────────────────────
  # Python: Ruff lint + pytest
  # ───────────────────────────────────────────────
  python:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Ruff lint
        run: ruff check .

      - name: Mypy strict (scripts/common.py)
        run: mypy

      - name: Pytest with coverage
        run: pytest tests/ --cov=scripts --cov-report=xml --cov-report=term --tb=short

      # v13.5: Codecov 連携 (public repo は token 不要)
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: python
          fail_ci_if_error: false  # 可視化が目的、Codecov 側障害で CI を落とさない

  # ───────────────────────────────────────────────
  # Frontend: ESLint + Vite build
  # ───────────────────────────────────────────────
  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install npm deps
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Vitest (snapshot tests)
        run: npm run test:ci

      - name: Build check
        run: npm run build
        env:
          BASE_URL: "/market-monitor/"

      # v13.5: Lighthouse CI (PR ごとにパフォーマンス・アクセシビリティを計測)
      - name: Lighthouse CI
        run: |
          npm install --no-save @lhci/cli@^0.14
          npx lhci autorun
        env:
          # Lighthouse の結果 URL (temporary-public-storage) を出力ログに表示
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
        continue-on-error: true  # warn 段階、CI を落とさない
